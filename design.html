<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ADB_Helper · Redesign</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  /* ---------- Design tokens ---------- */
  :root {
    /* Type */
    --font-ui: -apple-system, "Segoe UI", "Ubuntu", "Inter", Roboto, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "Cascadia Code", "Ubuntu Mono", "Menlo", Consolas, monospace;
    --fs-xs: 11px;
    --fs-sm: 12px;
    --fs-md: 13px;
    --fs-lg: 14px;
    --fs-xl: 16px;
    --fs-xxl: 18px;
    --lh: 1.45;

    /* Geometry */
    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 8px;
    --r-xl: 10px;
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-5: 20px;
    --sp-6: 24px;

    /* Components */
    --sidebar-w: 220px;
    --status-h: 32px;
    --row-h: 36px;
    --input-h: 32px;
    --btn-h: 32px;

    /* Accent */
    --accent: #2dd4bf;
    --accent-strong: #14b8a6;
    --accent-soft: rgba(45, 212, 191, 0.14);
    --accent-fg: #08201d;

    /* States */
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
  }

  /* Dark theme (default) */
  :root,
  [data-theme="dark"] {
    --bg-app: #0d1015;
    --bg-content: #121620;
    --bg-card: #171c26;
    --bg-card-2: #1d2330;
    --bg-elevated: #232a39;
    --bg-input: #131822;
    --bg-hover: rgba(255, 255, 255, 0.04);
    --bg-row-alt: rgba(255, 255, 255, 0.025);
    --bg-row-selected: rgba(45, 212, 191, 0.12);
    --bg-row-hover: rgba(255, 255, 255, 0.05);

    --border: #262d3c;
    --border-strong: #344055;
    --border-input: #2a3243;
    --border-focus: var(--accent);

    --text-1: #e6eaf0;
    --text-2: #a5acba;
    --text-3: #6b7280;
    --text-disabled: #4b5260;

    --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.02) inset, 0 1px 2px rgba(0, 0, 0, 0.4);

    --accent: #2dd4bf;
    --accent-strong: #14b8a6;
    --accent-soft: rgba(45, 212, 191, 0.14);
    --accent-fg: #08201d;

    color-scheme: dark;
  }

  /* Light theme */
  [data-theme="light"] {
    --bg-app: #eef0f3;
    --bg-content: #f4f6f8;
    --bg-card: #ffffff;
    --bg-card-2: #fafbfc;
    --bg-elevated: #f0f2f5;
    --bg-input: #ffffff;
    --bg-hover: rgba(0, 0, 0, 0.04);
    --bg-row-alt: rgba(0, 0, 0, 0.025);
    --bg-row-selected: rgba(13, 148, 136, 0.10);
    --bg-row-hover: rgba(0, 0, 0, 0.04);

    --border: #e2e5ea;
    --border-strong: #cbd1d9;
    --border-input: #d4d9e1;
    --border-focus: #0d9488;

    --text-1: #1a1d23;
    --text-2: #5b6371;
    --text-3: #868d99;
    --text-disabled: #b6bcc6;

    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.06);

    --accent: #0d9488;
    --accent-strong: #0f766e;
    --accent-soft: rgba(13, 148, 136, 0.10);
    --accent-fg: #ffffff;

    color-scheme: light;
  }

  /* ---------- Reset ---------- */
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font-ui);
    font-size: var(--fs-md);
    line-height: var(--lh);
    background: #0a0c10;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .window {
    color: var(--text-1);   /* re-resolves under data-theme */
  }
  button { font: inherit; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }

  /* ---------- Mock window ---------- */
  .stage {
    display: grid;
    place-items: center;
    width: 100%;
    height: 100vh;
    padding: 24px;
    background:
      radial-gradient(900px 600px at 20% 0%, rgba(45, 212, 191, 0.05), transparent 60%),
      radial-gradient(700px 500px at 100% 100%, rgba(45, 212, 191, 0.04), transparent 60%),
      #0a0c10;
    overflow: auto;
  }
  .window {
    width: min(1440px, 100%);
    height: min(900px, calc(100vh - 48px));
    background: var(--bg-app);
    border-radius: var(--r-xl);
    border: 1px solid var(--border);
    box-shadow:
      0 50px 80px -20px rgba(0, 0, 0, 0.65),
      0 20px 40px -20px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .titlebar {
    height: 36px;
    background: var(--bg-content);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    user-select: none;
  }
  .traffic { display: flex; gap: 8px; }
  .traffic span {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--border-strong);
  }
  .traffic span:nth-child(1) { background: #ef4444; }
  .traffic span:nth-child(2) { background: #f59e0b; }
  .traffic span:nth-child(3) { background: #22c55e; }
  .title {
    flex: 1; text-align: center;
    color: var(--text-2); font-size: var(--fs-sm);
    letter-spacing: 0.02em;
  }

  /* ---------- App shell ---------- */
  .shell {
    flex: 1;
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 1fr var(--status-h);
    grid-template-areas:
      "side main"
      "side status";
    min-height: 0;
  }
  /* Wide screen: a touch more breathing room */
  @media (min-width: 1700px) {
    .shell { grid-template-columns: 256px 1fr; }
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    grid-area: side;
    background: var(--bg-content);
    border-right: 1px solid var(--border);
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-height: 0;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px 14px;
    color: var(--text-1);
  }
  .brand .logo {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    display: grid; place-items: center;
    color: var(--accent-fg);
    font-weight: 700; font-size: 13px;
    box-shadow: 0 0 0 1px rgba(45, 212, 191, 0.25) inset;
  }
  .brand .name { font-weight: 600; font-size: var(--fs-lg); }
  .brand .ver { font-size: var(--fs-xs); color: var(--text-3); }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-md);
    color: var(--text-2);
    cursor: pointer;
    font-size: var(--fs-md);
    border: 0; background: transparent;
    text-align: left; width: 100%;
    transition: background .12s, color .12s;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-1); }
  .nav-item[aria-current="page"] {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .nav-item .ico { width: 18px; height: 18px; flex: none; opacity: .9; }
  .nav-item[aria-current="page"] .ico { opacity: 1; }
  .nav-spacer { flex: 1; }

  /* ---------- Main ---------- */
  .main {
    grid-area: main;
    background: var(--bg-app);
    overflow: auto;
    padding: 20px 24px;
    min-width: 0;
  }
  .page-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .page-title {
    font-size: var(--fs-xl); font-weight: 600;
    margin: 0;
  }
  .page-sub {
    color: var(--text-2);
    font-size: var(--fs-sm);
  }
  .page-actions { margin-left: auto; display: flex; gap: 8px; }

  /* ---------- Cards / sections ---------- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
  }
  .card-h {
    display: flex; align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    min-height: 44px;
  }
  .card-h .label {
    font-size: var(--fs-xs);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-2);
    font-weight: 600;
  }
  .card-h .right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .card-b { padding: 14px; }
  .card-f {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
    min-height: 50px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: minmax(340px, 1fr) minmax(420px, 1.4fr);
    gap: 16px;
    align-items: stretch;
  }
  .grid-2.equal {
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  }
  .grid-2.equal > .col {
    display: flex; flex-direction: column; gap: 16px;
    min-width: 0;
  }
  @media (max-width: 720px) {
    .grid-2, .grid-2.equal { grid-template-columns: 1fr; }
  }

  /* Connections page — 2x2 grid; cards in same row share height */
  .conn-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    grid-template-rows: auto auto;
    gap: 16px;
    align-items: stretch;
  }
  @media (max-width: 720px) {
    .conn-grid { grid-template-columns: 1fr; }
  }

  /* ---------- Form ---------- */
  .field {
    display: grid;
    grid-template-columns: 110px 1fr;
    align-items: center;
    gap: 12px;
    margin: 0 0 10px;
  }
  .field:last-child { margin-bottom: 0; }
  .field > label { color: var(--text-2); font-size: var(--fs-sm); }
  .row {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }

  .input,
  .select,
  .textarea {
    height: var(--input-h);
    background: var(--bg-input);
    color: var(--text-1);
    border: 1px solid var(--border-input);
    border-radius: var(--r-md);
    padding: 0 10px;
    outline: 0;
    width: 100%;
    min-width: 0;
  }
  .input::placeholder { color: var(--text-3); }
  .input:focus, .select:focus, .textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .input.small { height: 28px; padding: 0 8px; }
  .input.mono { font-family: var(--font-mono); }
  .input.num { max-width: 110px; }
  .input.pin { max-width: 130px; font-family: var(--font-mono); letter-spacing: 0.15em; }

  /* Button */
  .btn {
    appearance: none;
    height: var(--btn-h);
    padding: 0 14px;
    border-radius: var(--r-md);
    border: 1px solid var(--border-input);
    background: var(--bg-card-2);
    color: var(--text-1);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: var(--fs-md);
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-elevated); }
  .btn:disabled { color: var(--text-disabled); cursor: not-allowed; background: var(--bg-card-2); }
  .btn.small { height: 26px; padding: 0 10px; font-size: var(--fs-sm); }
  .btn.icon { padding: 0 8px; }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: transparent;
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-strong); }
  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-2);
  }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text-1); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: rgba(248, 113, 113, 0.10); }

  /* Checkbox */
  .check {
    appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-strong);
    border-radius: 3px;
    background: var(--bg-input);
    display: inline-grid; place-content: center;
    cursor: pointer;
    flex: none;
  }
  .check:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check:checked::after {
    content: "";
    width: 9px; height: 5px;
    border-left: 2px solid var(--accent-fg);
    border-bottom: 2px solid var(--accent-fg);
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .check:focus-visible { box-shadow: 0 0 0 3px var(--accent-soft); }

  .switch-label {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-2);
    font-size: var(--fs-sm);
  }

  /* ---------- Tables ---------- */
  .table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    font-size: var(--fs-sm);
  }
  .table thead th {
    text-align: left;
    color: var(--text-3);
    font-size: var(--fs-xs);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 10px 12px;
    background: var(--bg-card-2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    user-select: none;
  }
  .table tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-1);
    vertical-align: middle;
  }
  .table tbody tr:last-child td { border-bottom: 0; }
  .table tbody tr:nth-child(even) td { background: var(--bg-row-alt); }
  .table tbody tr:hover td { background: var(--bg-row-hover); }
  .table tbody tr.selected td { background: var(--bg-row-selected); }
  .table .col-check { width: 36px; }
  .table .col-actions { width: 1%; white-space: nowrap; }
  .table-scroll {
    max-height: 240px;
    overflow: auto;
    border-radius: var(--r-md);
  }
  .table .num { font-variant-numeric: tabular-nums; font-family: var(--font-mono); font-size: var(--fs-sm); }

  /* ---------- Badges & dots ---------- */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: var(--fs-xs);
    background: var(--bg-elevated);
    color: var(--text-2);
    border: 1px solid var(--border);
  }
  .badge.ok { color: var(--success); border-color: rgba(52, 211, 153, 0.3); background: rgba(52, 211, 153, 0.08); }
  .badge.warn { color: var(--warning); border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }
  .badge.err { color: var(--danger); border-color: rgba(248, 113, 113, 0.3); background: rgba(248, 113, 113, 0.08); }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-3);
    flex: none;
  }
  .dot.ok { background: var(--success); box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.18); }
  .dot.warn { background: var(--warning); }
  .dot.err { background: var(--danger); }

  /* ---------- Status bar ---------- */
  .statusbar {
    grid-area: status;
    background: var(--bg-content);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 14px;
    gap: 14px;
    color: var(--text-2);
    font-size: var(--fs-xs);
    user-select: none;
  }
  .statusbar .sep { width: 1px; height: 14px; background: var(--border); }
  .statusbar .seg { display: inline-flex; align-items: center; gap: 6px; }
  .statusbar .seg strong { color: var(--text-1); font-weight: 500; }
  .statusbar .right { margin-left: auto; display: inline-flex; align-items: center; gap: 14px; }

  /* ---------- Terminal ---------- */
  .terminal {
    background: #0a0e15;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-family: var(--font-mono);
    font-size: var(--fs-sm);
    color: #d8e0ea;
    padding: 12px;
    height: 100%;
    overflow: auto;
    white-space: pre;
  }
  [data-theme="light"] .terminal { background: #0f1722; }
  .term-status {
    display: flex; align-items: center;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 8px 12px;
    color: var(--text-2);
    font-family: var(--font-mono);
    font-size: var(--fs-sm);
    gap: 10px;
  }
  .term-prompt {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    background: var(--bg-input);
    border: 1px solid var(--border-input);
    border-radius: var(--r-md);
  }
  .term-prompt .pfx { color: var(--accent); font-family: var(--font-mono); white-space: nowrap; }
  .term-prompt input {
    flex: 1; height: 24px; min-width: 0;
    background: transparent; border: 0; outline: 0;
    color: var(--text-1);
    font-family: var(--font-mono);
  }

  /* ---------- Logcat command preview ---------- */
  .codeblock {
    background: var(--bg-input);
    border: 1px solid var(--border-input);
    border-radius: var(--r-md);
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: var(--fs-sm);
    color: var(--text-1);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    line-height: 1.6;
    display: block;
  }
  .codeblock .muted { color: var(--text-3); }
  .codeblock .accent { color: var(--accent); }
  .codeblock .line { display: block; }
  .codeblock .line.cont { padding-left: 2ch; }

  .install-status {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    color: var(--text-2);
    font-size: var(--fs-sm);
    min-height: 32px;
  }
  .install-status .status-text { font-family: var(--font-mono); font-size: var(--fs-sm); }
  .install-status.is-running { color: var(--accent); border-color: var(--accent-soft); }
  .install-status.is-running .dot { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .install-status.is-done    .dot { background: var(--success); box-shadow: 0 0 0 3px rgba(52,211,153,0.18); }
  .install-status.is-error   { color: var(--danger); }
  .install-status.is-error   .dot { background: var(--danger); }

  /* ---------- Progress ---------- */
  .progress {
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 999px;
    overflow: hidden;
    flex: 1;
  }
  .progress > i {
    display: block; height: 100%;
    background: var(--accent);
    border-radius: inherit;
    width: 0;
  }

  /* ---------- Stat ---------- */
  .stat {
    display: flex; flex-direction: column; gap: 6px;
    min-width: 0;
  }
  .stat .lbl {
    font-size: var(--fs-xs);
    color: var(--text-2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .stat .val { font-family: var(--font-mono); font-size: var(--fs-sm); color: var(--text-2); }

  /* ---------- Info list ---------- */
  .info-list {
    display: grid;
    grid-template-columns: 180px 1fr;
    row-gap: 8px;
    column-gap: 16px;
  }
  .info-list dt { color: var(--text-2); font-size: var(--fs-sm); }
  .info-list dd { margin: 0; font-family: var(--font-mono); font-size: var(--fs-sm); color: var(--text-1); overflow-wrap: anywhere; }

  /* ---------- Button grid ---------- */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }
  @media (max-width: 720px) {
    .btn-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  .btn-tile {
    height: 64px;
    border-radius: var(--r-md);
    background: var(--bg-card-2);
    border: 1px solid var(--border);
    color: var(--text-1);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    font-size: var(--fs-md);
    transition: background .12s, border-color .12s, transform .04s;
  }
  .btn-tile:hover { background: var(--bg-elevated); border-color: var(--border-strong); }
  .btn-tile:active { transform: translateY(1px); }
  .btn-tile .ico { width: 18px; height: 18px; opacity: .85; }

  /* ---------- Split view (Apps) ---------- */
  .split {
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
    gap: 16px;
    align-items: stretch;
    min-height: 0;
  }
  @media (max-width: 720px) {
    .split { grid-template-columns: 1fr; }
  }
  .app-meta {
    display: grid;
    grid-template-columns: 50px 1fr;
    gap: 12px;
    align-items: center;
  }
  .app-ico {
    width: 50px; height: 50px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2dd4bf22, #2dd4bf08);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    color: var(--accent);
    font-weight: 700; font-family: var(--font-mono);
  }
  .pkg-name { font-weight: 600; font-size: var(--fs-md); overflow-wrap: anywhere; }
  .pkg-sub { color: var(--text-2); font-size: var(--fs-sm); font-family: var(--font-mono); }

  /* misc */
  .empty {
    display: grid; place-items: center;
    height: 100%; min-height: 80px;
    color: var(--text-3); font-size: var(--fs-sm);
  }

function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV.map(([id, label, ico]) => `
    <button class="nav-item" data-page="${id}" aria-current="${id==='connections'?'page':'false'}">
      ${ico}
      <span>${label}</span>
    </button>

  nav.addEventListener('click', (e) => {
    const b = e.target.closest('.nav-item');
    if (!b) return;
    [...nav.children].forEach(n => n.setAttribute('aria-current', 'false'));
    b.setAttribute('aria-current', 'page');
    showPage(b.dataset.page);
  });
}

function showPage(id) {
  const main = document.getElementById('main');

  }
}

/* =================== Theme =================== */
function applyTheme(mode) {
  const w = document.getElementById('window');
  const isAuto = mode === 'auto';
  const resolved = isAuto
    ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
    : mode;
  w.setAttribute('data-theme', resolved);
  localStorage.setItem('adbh-theme', mode);
}
applyTheme(localStorage.getItem('adbh-theme') || 'dark');
window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
  if ((localStorage.getItem('adbh-theme') || 'dark') === 'auto') applyTheme('auto');
});

renderNav();
showPage('connections');
</script>
